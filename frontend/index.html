<!DOCTYPE html>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f5f7fa;
            text-align: center;
            margin: 0;
            padding: 20px;
        }

        h1 {
            color: #333;
        }

        .container {
            background: white;
            padding: 20px;
            margin: 20px auto;
            width: 300px;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.1);
        }

        input {
            width: 90%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            padding: 10px 15px;
            border: none;
            background: #4CAF50;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #45a049;
        }

        ul {
            list-style: none;
            padding: 0;
        }

        li {
            background: #eef2f7;
            margin: 5px 0;
            padding: 10px;
            border-radius: 5px;
        }
    </style>
<h1>User Management 🚀</h1>

<div class="container">
    <h2>Add User</h2>
    <input id="name" placeholder="Name">
    <input id="age" placeholder="Age">
    <button onclick="addUser()">Add</button>
</div>

<div class="container">
    <h2>All Users</h2>
    <ul id="userList"></ul>
</div>

<script>
    const API = "http://localhost:8080/users";

    async function getUsers() {
        const res = await fetch(API);
        const users = await res.json();

        const list = document.getElementById("userList");
        list.innerHTML = "";

        users.forEach(u => {
            const li = document.createElement("li");
            li.innerText = u.id + " - " + u.name + " (" + u.age + ")";
            list.appendChild(li);
        });
    }

    async function addUser() {
        const name = document.getElementById("name").value;
        const age = document.getElementById("age").value;

        await fetch(API, {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ name, age })
        });

        getUsers();
    }

    getUsers();
</script>
